name: expensia_app
description: AI-Powered Personal Finance Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  
  # Voice Recording
  record: ^7.0.0
  permission_handler: ^11.1.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  
  # File system
  path_provider: ^2.1.2

  # Utilities
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
